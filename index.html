<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 FIFA World Cup 2026 — Live Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; text-align: center; border-bottom: 3px solid #e6c200; }
.header h1 { font-size: 2em; } .header span { color: #e6c200; }
.layout { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
.player-panel { flex: 2; min-width: 600px; } .standings-panel { flex: 1; min-width: 350px; }
.video-container { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
video { width: 100%; display: block; }
.channel-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
.channel-btn { padding: 12px 20px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fff; cursor: pointer; font-size: 14px; }
.channel-btn:hover { background: #2a2a2a; border-color: #e6c200; }
.channel-btn.active { background: #e6c200; color: #000; border-color: #e6c200; font-weight: bold; }
.card { background: #1a1a2e; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
.card h2 { color: #e6c200; margin-bottom: 12px; font-size: 1.1em; }
.group-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.group-table td { padding: 5px 4px; border-bottom: 1px solid #1a1a2e; }
.group-table .g1 { border-left: 3px solid #4caf50; } .group-table .g2 { border-left: 3px solid #4caf50; }
.group-table .g3 { border-left: 3px solid #ff9800; }
.group-table tr:hover { background: #1e1e36; }
.refresh { text-align: center; padding: 10px; color: #666; font-size: 12px; }
.now-playing { padding: 8px 12px; background: #111; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
.now-playing span { color: #e6c200; }
@media (max-width: 900px) { .player-panel, .standings-panel { min-width: 100%; } .layout { flex-direction: column; } }
</style>
</head>
<body>
<div class="header"><h1>🏆 <span>FIFA WORLD CUP 2026</span></h1><p style="color:#888">Live Streaming · Standings</p></div>
<div class="layout">
<div class="player-panel">
<div class="video-container"><video id="video" controls autoplay></video></div>
<div class="now-playing">📺 <span id="now-playing">TVRI Nasional 🇮🇩</span></div>
<div class="channel-bar">
<button class="channel-btn active" onclick="switchChannel('tvri')">🇮🇩 TVRI Nasional</button>
<button class="channel-btn" onclick="switchChannel('metrotv')">📡 Metro TV</button>
<button class="channel-btn" onclick="switchChannel('cnbc')">💹 CNBC Indonesia</button>
<button class="channel-btn" onclick="switchChannel('bein')">🇺🇸 beIN SPORTS</button>
<button class="channel-btn" onclick="switchChannel('fifaen')">🇬🇧 FIFA+ English</button>
</div>
<div class="card"><h2>📅 Today</h2><div id="today-matches">Loading...</div></div>
</div>
<div class="standings-panel" id="standings"><div style="text-align:center;padding:30px">Loading...</div></div>
</div>
<div class="refresh">Auto-refresh 60s · api.fifa.com</div>
<script>
const CH={tvri:{u:"https://ott-balancer.tvri.go.id/live/eds/Nasional/hls/Nasional.m3u8",n:"TVRI Nasional 🇮🇩"},metrotv:{u:"https://edge.medcom.id/live-edge/smil:metro.smil/playlist.m3u8",n:"Metro TV"},cnbc:{u:"https://live.cnbcindonesia.com/livecnbc/smil:cnbctv.smil/master.m3u8",n:"CNBC Indonesia"},bein:{u:"https://bein-xtra-bein.amagi.tv/playlist.m3u8",n:"beIN SPORTS 🇺🇸"},fifaen:{u:"https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8",n:"FIFA+ English 🇬🇧"}};
let hls=null,v=document.getElementById('video');
function switchChannel(c){let ch=CH[c];if(!ch)return;document.querySelectorAll('.channel-btn').forEach(b=>b.classList.remove('active'));event.target.closest('.channel-btn').classList.add('active');if(hls){hls.destroy();hls=null}v.src='';document.getElementById('now-playing').textContent=ch.n;if(Hls.isSupported()){hls=new Hls({enableWorker:false});hls.loadSource(ch.u);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}))}else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=ch.u;v.play().catch(()=>{})}}
async function loadS(){try{let r=await fetch('https://api.fifa.com/api/v3/calendar/17/285023/289273/standing');let d=await r.json(),g={};d.Results.forEach(t=>{let gn=t.Group[0].Description;if(!g[gn])g[gn]=[];g[gn].push({p:t.Position,n:t.Team.Name[0].Description,pl:t.Played,w:t.Won,d:t.Drawn,l:t.Lost,gf:t.For,ga:t.Against,gd:t.GoalsDiference,pt:t.Points})});let h='';Object.keys(g).sort().forEach(gn=>{g[gn].sort((a,b)=>b.pt-a.pt||b.gd-a.gd||b.gf-a.gf);h+='<div class="card"><h2>'+gn+'</h2><table class="group-table">';g[gn].forEach((t,i)=>{let cl=i<2?'g1':(i==2?'g3':'');h+='<tr><td class="'+cl+'">'+t.p+'</td><td>'+t.n+'</td><td>'+t.pl+'</td><td>'+t.gf+'-'+t.ga+'</td><td>'+(t.gd>0?'+':'')+t.gd+'</td><td><b>'+t.pt+'</b></td></tr>'});h+='</table></div>'});document.getElementById('standings').innerHTML=h}catch(e){}}
switchChannel('tvri');loadS();setInterval(loadS,60000);
</script>
</body>
</html>
